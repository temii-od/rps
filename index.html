<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using RPS to learn DOM manipulation</title>
    <style>
          body { font-family: sans-serif; text-align: center; padding-top: 50px; }
         .scoreboard { font-size: 1.5rem; margin-bottom: 20px; }
          button { padding: 10px 20px; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    
    <div class="scoreboard">
        <p>Human: <span id="human-score">0</span></p>
        <p>Computer: <span id="computer-score">0</span></p>
    </div>

    <h2 id="results-message">Click the button to start a 5-round game!</h2>
    <button id="start-btn">Start Game</button>
    <script src="script.js"></script>
</body>
</html>
